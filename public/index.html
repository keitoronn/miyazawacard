<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Battle - ロビー</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="lobby-container">
    <h1 class="game-title">Card Battle</h1>
    <p class="subtitle">4人対戦カードバトル</p>

    <div class="lobby-card">
      <div class="input-group">
        <label for="player-name">プレイヤー名</label>
        <input type="text" id="player-name" placeholder="名前を入力" maxlength="12" autocomplete="off">
      </div>

      <div class="lobby-actions">
        <div class="action-section">
          <button id="create-btn" class="btn btn-primary">ルームを作成</button>
        </div>

        <div class="divider"><span>or</span></div>

        <div class="action-section">
          <div class="input-group">
            <label for="room-code">ルームコード</label>
            <input type="text" id="room-code" placeholder="ABCD" maxlength="4" autocomplete="off" style="text-transform: uppercase;">
          </div>
          <button id="join-btn" class="btn btn-secondary">ルームに参加</button>
        </div>
      </div>

      <div id="error-msg" class="error-msg" style="display:none;"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/lobby.js"></script>
</body>
</html>
